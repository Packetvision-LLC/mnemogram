[workspace]
resolver = "2"
members = [
    "shared",
    "api-ingest",
    "api-search",
    "api-manage",
    "api-status",
    "authorizer",
    "stripe-webhook",
    "recall",
    "batch-recall",
    "ingest",
    "search",
    "validate-upload",
]

[workspace.dependencies]
lambda_runtime = "0.13"
lambda_http = "0.13"
aws-sdk-s3 = "1"
aws-sdk-dynamodb = "1"
aws-config = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
thiserror = "2"
uuid = { version = "1", features = ["v4"] }
jsonwebtoken = "9"
chrono = { version = "0.4", features = ["serde"] }
