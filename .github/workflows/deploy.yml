name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  CARGO_TERM_COLOR: always
  # TODO: Replace ACCOUNT_ID with your actual AWS account ID
  AWS_ROLE_ARN: "arn:aws:iam::369292120314:role/mnemogram-github-deploy"
  AWS_REGION: us-east-1

jobs:
  build:
    name: Build Lambdas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lambdas

      - name: Install cargo-lambda
        run: pip3 install cargo-lambda

      - name: Build all Lambdas
        working-directory: lambdas
        run: cargo lambda build --release --target aarch64-unknown-linux-musl

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-artifacts
          path: lambdas/target/lambda/
          retention-days: 1

  deploy:
    name: Deploy to AWS
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Download Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-artifacts
          path: lambdas/target/lambda/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK Deploy
        working-directory: infra
        run: npx cdk deploy --all --require-approval never
